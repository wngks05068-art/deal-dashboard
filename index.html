<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 파이프라인 현황판</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f0;color:#1a1a1a;line-height:1.6;}
.container{max-width:96vw;width:100%;margin:0 auto;padding:20px 2vw 40px;}
.top-bar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
.top-left h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;}
.top-left .subtitle{font-size:0.82rem;color:#888;}
.top-left .meta-row{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#999;margin-top:6px;}
.meta-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;}
.top-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{padding:8px 16px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:0.82rem;cursor:pointer;font-weight:500;transition:all .2s;}
.btn:hover{background:#f0f0f0;}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn-primary:hover{background:#333;}
.btn-danger{color:#d32f2f;border-color:#d32f2f;background:#fff;}
.btn-danger:hover{background:#fef0f0;}
.btn-sm{padding:5px 12px;font-size:0.78rem;border-radius:14px;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:28px;}
.summary-card{background:#fff;border-radius:14px;padding:18px 16px;border:1px solid #eee;}
.summary-card .label{font-size:0.75rem;color:#999;margin-bottom:4px;}
.summary-card .value{font-size:1.8rem;font-weight:700;}
.summary-card .sub{font-size:0.72rem;color:#aaa;margin-top:2px;}
.fund-breakdown{margin-top:10px;border-top:1px solid #f0f0f0;padding-top:8px;}
.fund-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:0.75rem;}
.fund-row .fund-name{color:#666;font-weight:500;}
.fund-row .fund-amt{font-weight:700;color:#1a1a1a;}
.fund-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:0.65rem;font-weight:600;margin-right:4px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.section-title{font-size:1rem;font-weight:700;}
.section-hint{font-size:0.75rem;color:#bbb;}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px;min-height:200px;}
.kanban-col{background:#fff;border-radius:14px;border:1px solid #eee;padding:14px 10px;display:flex;flex-direction:column;}
.kanban-col-header{text-align:center;padding-bottom:10px;border-bottom:1px solid #f0f0f0;margin-bottom:10px;}
.kanban-col-header .col-title{font-size:0.88rem;font-weight:600;}
.kanban-col-header .col-stat{font-size:0.75rem;color:#999;margin-top:2px;}
.kanban-cards{flex:1;display:flex;flex-direction:column;gap:8px;}
.kanban-card{background:#fafafa;border-radius:10px;padding:12px;cursor:pointer;transition:box-shadow .2s;border:1px solid #f0f0f0;}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06);background:#f5f5f5;}
.kanban-card .kc-name{font-size:0.88rem;font-weight:700;margin-bottom:2px;}
.kanban-card .kc-sector{font-size:0.72rem;color:#999;}
.kanban-card .kc-amount{font-size:0.95rem;font-weight:700;margin:4px 0;}
.kanban-card .kc-date{font-size:0.72rem;color:#aaa;margin-bottom:6px;}
.kanban-card .kc-bar{height:5px;border-radius:3px;background:#eee;display:flex;overflow:hidden;gap:1px;margin-bottom:6px;}
.kanban-card .kc-bar .seg{height:100%;border-radius:3px;flex:1;}
.seg-done{background:#4ade80;}
.seg-current{background:#3b82f6;}
.seg-future{background:#e0e0e0;}
.kanban-card .kc-bottom{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.kanban-card .kc-bottom .mgr-badge,.kanban-card .kc-bottom .fund-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.68rem;font-weight:600;}
.milestone-table{width:100%;border-collapse:collapse;margin-bottom:28px;background:#fff;border-radius:14px;overflow:hidden;border:1px solid #eee;}
.milestone-table thead{background:#fafafa;}
.milestone-table th{padding:12px 10px;font-size:0.75rem;color:#999;font-weight:500;text-align:left;border-bottom:1px solid #eee;}
.milestone-table td{padding:12px 10px;font-size:0.82rem;border-bottom:1px solid #f5f5f5;vertical-align:middle;cursor:pointer;}
.milestone-table tr:last-child td{border-bottom:none;}
.milestone-table tbody tr:hover{background:#fafafa;}
.stage-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:0.7rem;font-weight:600;}
.badge-s1{background:#e3f2fd;color:#1565c0;}
.badge-s2{background:#f3e5f5;color:#7b1fa2;}
.badge-s3{background:#e8f5e9;color:#2e7d32;}
.badge-s4{background:#fff3e0;color:#e65100;}
.badge-s5{background:#fce4ec;color:#c62828;}
.dday-badge{display:inline-block;padding:4px 8px;border-radius:8px;font-size:0.75rem;font-weight:700;min-width:36px;text-align:center;}
.dday-urgent{background:#fee;color:#d32f2f;}
.dday-normal{background:#e3f2fd;color:#1565c0;}
.dday-none{background:#f5f5f5;color:#999;}
.progress-dots{display:flex;gap:3px;}
.progress-dots span{width:8px;height:8px;border-radius:50%;background:#e0e0e0;}
.progress-dots span.active{background:#4ade80;}
.footer-note{text-align:center;font-size:0.75rem;color:#bbb;padding:20px 0;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1000;justify-content:center;align-items:center;}
.modal-overlay.active{display:flex;}
.modal{background:#fff;border-radius:16px;padding:28px;width:90vw;max-width:90vw;max-height:88vh;overflow-y:auto;}
.modal h2{font-size:1.15rem;margin-bottom:20px;font-weight:700;}
.detail-section{margin-top:16px;padding-top:14px;border-top:1px solid #f0f0f0;}
.detail-section h3{font-size:0.9rem;font-weight:600;margin-bottom:10px;color:#555;}
.history-timeline{position:relative;padding-left:20px;}
.history-timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:#e0e0e0;}
.history-item{position:relative;padding:6px 0 6px 16px;display:flex;justify-content:space-between;align-items:center;}
.history-item::before{content:'';position:absolute;left:-14px;top:12px;width:8px;height:8px;border-radius:50%;background:#4ade80;border:2px solid #fff;z-index:1;}
.history-item .h-date{font-size:0.82rem;color:#999;min-width:90px;}
.history-item .h-stage{font-size:0.85rem;font-weight:500;}
.history-item .h-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:0.75rem;padding:2px 6px;}
.history-item .h-del:hover{color:#d32f2f;}
.add-history-row{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.add-history-row select,.add-history-row input{padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:0.82rem;font-family:inherit;}
.next-stage-row{display:flex;gap:12px;align-items:flex-start;margin-top:8px;flex-wrap:wrap;}
.next-stage-row .ns-group{display:flex;flex-direction:column;gap:4px;}
.next-stage-row .ns-group label{font-size:0.75rem;color:#999;}
.next-stage-row .ns-group select,.next-stage-row .ns-group input{padding:6px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:0.82rem;font-family:inherit;}
.next-stage-hint{font-size:0.72rem;color:#bbb;margin-top:6px;}
.detail-actions{display:flex;gap:8px;margin-top:24px;justify-content:space-between;align-items:center;}
.detail-actions-left{display:flex;gap:8px;}
.detail-actions-right{display:flex;gap:8px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:0.8rem;color:#666;margin-bottom:4px;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:0.9rem;outline:none;font-family:inherit;}
.form-group input:focus,.form-group select:focus{border-color:#1a1a1a;}
.form-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.mgr-list,.fund-list-ul{list-style:none;margin-bottom:16px;}
.mgr-list li,.fund-list-ul li{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.mgr-list li:last-child,.fund-list-ul li:last-child{border-bottom:none;}
.mgr-badge-lg,.fund-badge-lg{display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.82rem;font-weight:600;}
.mgr-del,.fund-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:0.85rem;padding:4px 8px;}
.mgr-del:hover,.fund-del:hover{color:#d32f2f;}
.mgr-add-row,.fund-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.mgr-add-row input,.mgr-add-row select,.fund-add-row input,.fund-add-row select{padding:8px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:0.85rem;font-family:inherit;}
.mgr-add-row input,.fund-add-row input{flex:1;min-width:120px;}
.fund-add-row .fund-short{width:80px;flex:none;}
.mgr-empty,.fund-empty{text-align:center;color:#999;font-size:0.85rem;padding:16px 0;}
@media(max-width:768px){
.summary-grid{grid-template-columns:1fr 1fr;}
.kanban{grid-template-columns:1fr;gap:8px;}
.form-row,.form-row-3{grid-template-columns:1fr;}
.top-bar{flex-direction:column;}
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="top-left">
      <h1>투자 파이프라인 현황판</h1>
      <div class="subtitle">5단계 프로세스 · 단계별 진입 이력 추적 · 데이터는 Firebase에 실시간 저장됩니다</div>
      <div class="meta-row"><span class="meta-dot"></span> <span>실시간 동기화</span> · <span id="todayDate"></span></div>
    </div>
    <div class="top-right">
      <button class="btn" onclick="openFundModal()">조합 관리</button>
      <button class="btn" onclick="openMgrModal()">담당자 관리</button>
      <button class="btn" onclick="exportJSON()">내보내기</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">가져오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn btn-primary" onclick="openAddModal()">+ 기업 추가</button>
    </div>
  </div>
  <div class="summary-grid">
    <div class="summary-card"><div class="label">검토 기업 수</div><div class="value" id="sumCount">0</div><div class="sub">전체 파이프라인</div></div>
    <div class="summary-card">
      <div class="label">투자 예정 총액</div><div class="value" id="sumAmount">0억</div><div class="sub" id="sumAmountSub"></div>
      <div class="fund-breakdown" id="fundBreakdown"></div>
    </div>
    <div class="summary-card"><div class="label">가장 임박한 일정</div><div class="value" id="sumNearest">-</div><div class="sub" id="sumNearestSub"></div></div>
    <div class="summary-card"><div class="label">납입 완료</div><div class="value" id="sumDone">0억</div><div class="sub" id="sumDoneSub"></div></div>
  </div>
  <div class="section-header"><div class="section-title">파이프라인 (5단계)</div><div class="section-hint">카드 클릭 시 상세/이력 편집</div></div>
  <div class="kanban" id="kanbanBoard"></div>
  <div class="section-header"><div class="section-title">다음 마일스톤 (임박순)</div></div>
  <table class="milestone-table">
    <thead><tr><th>기업명</th><th>섹터</th><th>조합</th><th>담당자</th><th>현재 단계</th><th>금액</th><th>다음 예정</th><th>D-day</th><th>진행률</th></tr></thead>
    <tbody id="milestoneBody"></tbody>
  </table>
  <div class="footer-note">데이터는 Firebase에 실시간 저장됩니다. 모든 기기에서 동일한 데이터가 표시됩니다.</div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
<div class="modal" style="max-width:560px;">
  <h2>기업 추가</h2>
  <div class="form-group"><label>회사명</label><input id="aName" placeholder="(주)회사명"></div>
  <div class="form-row-3">
    <div class="form-group"><label>섹터</label><input id="aSector" placeholder="소비재, AI 등"></div>
    <div class="form-group"><label>담당자</label><select id="aManager"></select></div>
    <div class="form-group"><label>조합</label><select id="aFund"></select></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>투자금액 (억)</label><input id="aAmount" type="number" placeholder="30"></div>
    <div class="form-group"><label>현재 단계</label>
      <select id="aStage"><option value="s1">S1 - 투자팀 IR</option><option value="s2">S2 - 공식 IR</option><option value="s3">S3 - 투자심의위원회</option><option value="s4">S4 - 투자계약</option><option value="s5">S5 - 투자금 납입</option></select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>진입일</label><input id="aDate" type="date"></div>
    <div class="form-group"><label>비고</label><input id="aNote" placeholder="메모"></div>
  </div>
  <div class="form-actions">
    <button class="btn" onclick="closeAddModal()">취소</button>
    <button class="btn btn-primary" onclick="saveNewDeal()">저장</button>
  </div>
</div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
<div class="modal" style="max-width:620px;" id="detailModalContent"></div>
</div>

<!-- Manager Modal -->
<div class="modal-overlay" id="mgrModal">
<div class="modal" style="max-width:440px;">
  <h2>담당자 관리</h2>
  <div id="mgrListArea"></div>
  <div class="mgr-add-row">
    <input id="mgrNewName" placeholder="이름">
    <select id="mgrNewColor">
      <option value="#2e7d32">● 초록</option>
      <option value="#1565c0">● 파랑</option>
      <option value="#e65100">● 주황</option>
      <option value="#7b1fa2">● 보라</option>
      <option value="#c62828">● 빨강</option>
      <option value="#00695c">● 청록</option>
    </select>
    <button class="btn btn-sm btn-primary" onclick="addManager()">등록</button>
  </div>
  <div class="form-actions" style="margin-top:20px;"><button class="btn" onclick="closeMgrModal()">닫기</button></div>
</div>
</div>

<!-- Fund Modal -->
<div class="modal-overlay" id="fundModal">
<div class="modal" style="max-width:520px;">
  <h2>조합 관리</h2>
  <div id="fundListArea"></div>
  <div class="fund-add-row">
    <input id="fundNewName" placeholder="조합 정식명칭">
    <input id="fundNewShort" class="fund-short" placeholder="약칭">
    <select id="fundNewColor">
      <option value="#1565c0">● 파랑</option>
      <option value="#2e7d32">● 초록</option>
      <option value="#e65100">● 주황</option>
      <option value="#7b1fa2">● 보라</option>
      <option value="#c62828">● 빨강</option>
      <option value="#00695c">● 청록</option>
    </select>
    <button class="btn btn-sm btn-primary" onclick="addFund()">등록</button>
  </div>
  <div class="form-actions" style="margin-top:20px;"><button class="btn" onclick="closeFundModal()">닫기</button></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCgbT4EtCslRDIa2A1BsQHgoZcgJ97aJmU",
  authDomain:"deal-dashboard-f9805.firebaseapp.com",
  projectId:"deal-dashboard-f9805",
  storageBucket:"deal-dashboard-f9805.firebasestorage.app",
  messagingSenderId:"219848294450",
  appId:"1:219848294450:web:58d3fc2fe65d40d8ee3c2b"
});
const db=firebase.firestore();
const dealsRef=db.collection('deals');
const mgrsRef=db.collection('managers');
const fundsRef=db.collection('funds');

const STAGES={s1:'투자팀 IR',s2:'공식 IR',s3:'투자심의위원회',s4:'투자계약',s5:'투자금 납입'};
const STAGE_KEYS=['s1','s2','s3','s4','s5'];
const COLOR_BG={'#2e7d32':'#e8f5e9','#1565c0':'#e3f2fd','#e65100':'#fff3e0','#7b1fa2':'#f3e5f5','#c62828':'#fce4ec','#00695c':'#e0f2f1'};
let companies=[],managers=[],funds=[];

document.getElementById('todayDate').textContent='오늘: '+new Date().toISOString().slice(0,10);
document.getElementById('aDate').value=new Date().toISOString().slice(0,10);

dealsRef.orderBy('name').onSnapshot(snap=>{companies=[];snap.forEach(doc=>companies.push({id:doc.id,...doc.data()}));renderAll();});
mgrsRef.orderBy('name').onSnapshot(snap=>{managers=[];snap.forEach(doc=>managers.push({id:doc.id,...doc.data()}));renderMgrList();refreshSelects();renderAll();});
fundsRef.orderBy('name').onSnapshot(snap=>{funds=[];snap.forEach(doc=>funds.push({id:doc.id,...doc.data()}));renderFundList();refreshSelects();renderAll();});

function renderAll(){renderSummary();renderKanban();renderMilestones();}

function getCurrentStage(c){if(!c.history||c.history.length===0)return{stage:'s1',date:''};return c.history[c.history.length-1];}
function getStageIndex(s){return STAGE_KEYS.indexOf(s);}
function getDday(ds){if(!ds)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(ds);d.setHours(0,0,0,0);return Math.ceil((d-t)/864e5);}
function getBg(color){return COLOR_BG[color]||'#f5f5f5';}
function getMgrInfo(name){const m=managers.find(x=>x.name===name);return m?{bg:getBg(m.color),fg:m.color}:{bg:'#f5f5f5',fg:'#999'};}
function getFundInfo(name){const f=funds.find(x=>x.name===name);return f?{bg:getBg(f.color),fg:f.color,short:f.short}:{bg:'#f5f5f5',fg:'#999',short:name};}

function badgeHtml(name,info,size){
  if(!name)return'';
  const fs=size==='sm'?'0.68rem':'0.78rem';const pd=size==='sm'?'2px 8px':'3px 10px';
  return`<span style="background:${info.bg};color:${info.fg};padding:${pd};border-radius:10px;font-size:${fs};font-weight:600;">${info.short||name}</span>`;
}
function mgrBadge(name,size){return badgeHtml(name,getMgrInfo(name),size);}
function fundBadge(name,size){const i=getFundInfo(name);return badgeHtml(i.short||name,i,size);}

function refreshSelects(){
  // Manager selects
  document.querySelectorAll('.mgr-select').forEach(sel=>{
    const cur=sel.value;sel.innerHTML='<option value="">(담당자 미지정)</option>';
    managers.forEach(m=>{sel.innerHTML+=`<option value="${m.name}">${m.name}</option>`;});sel.value=cur;
  });
  const addMgr=document.getElementById('aManager');
  if(addMgr){const cur=addMgr.value;addMgr.innerHTML='<option value="">(담당자 미지정)</option>';managers.forEach(m=>{addMgr.innerHTML+=`<option value="${m.name}">${m.name}</option>`;});addMgr.value=cur;}
  // Fund selects
  document.querySelectorAll('.fund-select').forEach(sel=>{
    const cur=sel.value;sel.innerHTML='<option value="">(조합 미지정)</option>';
    funds.forEach(f=>{sel.innerHTML+=`<option value="${f.name}">${f.short} (${f.name})</option>`;});sel.value=cur;
  });
  const addFund=document.getElementById('aFund');
  if(addFund){const cur=addFund.value;addFund.innerHTML='<option value="">(조합 미지정)</option>';funds.forEach(f=>{addFund.innerHTML+=`<option value="${f.name}">${f.short} (${f.name})</option>`;});addFund.value=cur;}
}

function renderSummary(){
  document.getElementById('sumCount').textContent=companies.length+'개사';
  const totalAmt=companies.reduce((s,c)=>s+(c.amount||0),0);
  document.getElementById('sumAmount').textContent=totalAmt+'억';
  document.getElementById('sumAmountSub').textContent=companies.length+'개사 합계';

  // Fund breakdown
  const fbEl=document.getElementById('fundBreakdown');
  if(funds.length>0){
    let fbHtml='';
    funds.forEach(f=>{
      const amt=companies.filter(c=>c.fund===f.name).reduce((s,c)=>s+(c.amount||0),0);
      fbHtml+=`<div class="fund-row"><span class="fund-name"><span class="fund-badge" style="background:${getBg(f.color)};color:${f.color};">${f.short}</span></span><span class="fund-amt">${amt}억</span></div>`;
    });
    const unassigned=companies.filter(c=>!c.fund).reduce((s,c)=>s+(c.amount||0),0);
    if(unassigned>0)fbHtml+=`<div class="fund-row"><span class="fund-name" style="color:#bbb;">미지정</span><span class="fund-amt" style="color:#bbb;">${unassigned}억</span></div>`;
    fbEl.innerHTML=fbHtml;
  }else{fbEl.innerHTML='';}

  let nearest=null,nearestComp=null;
  companies.forEach(c=>{if(c.plannedNext&&c.plannedNext.date){const d=getDday(c.plannedNext.date);if(d!==null&&d>=0&&(nearest===null||d<nearest)){nearest=d;nearestComp=c;}}});
  if(nearestComp&&nearestComp.plannedNext){
    document.getElementById('sumNearest').textContent=(nearestComp.plannedNext.date||'').slice(5).replace('-','/');
    document.getElementById('sumNearestSub').textContent=nearestComp.name+' · '+STAGES[nearestComp.plannedNext.stage||'s5'];
  }else{document.getElementById('sumNearest').textContent='-';document.getElementById('sumNearestSub').textContent='';}
  const doneComps=companies.filter(c=>getCurrentStage(c).stage==='s5');
  document.getElementById('sumDone').textContent=doneComps.reduce((s,c)=>s+(c.amount||0),0)+'억';
  document.getElementById('sumDoneSub').textContent=doneComps.length+'개사';
}

function renderKanban(){
  const el=document.getElementById('kanbanBoard');
  const grouped={};STAGE_KEYS.forEach(sk=>grouped[sk]=[]);
  companies.forEach(c=>{const s=getCurrentStage(c).stage;if(grouped[s])grouped[s].push(c);});
  let html='';
  STAGE_KEYS.forEach(sk=>{
    const list=grouped[sk];const amt=list.reduce((s,c)=>s+(c.amount||0),0);
    html+=`<div class="kanban-col"><div class="kanban-col-header"><div class="col-title">${STAGES[sk]}</div><div class="col-stat">${list.length}개사 · ${amt}억</div></div><div class="kanban-cards">`;
    list.forEach(c=>{
      const cur=getCurrentStage(c);const curIdx=getStageIndex(cur.stage);
      const entryDate=cur.date?(cur.date.slice(5).replace('-','/')):'';
      let bar='<div class="kc-bar">';for(let i=0;i<5;i++){if(i<curIdx)bar+=`<div class="seg seg-done"></div>`;else if(i===curIdx)bar+=`<div class="seg seg-current"></div>`;else bar+=`<div class="seg seg-future"></div>`;}bar+='</div>';
      html+=`<div class="kanban-card" onclick="openDetail('${c.id}')">
        <div class="kc-name">${c.name}</div><div class="kc-sector">${c.sector||''}</div>
        <div class="kc-amount">${c.amount||0}억</div><div class="kc-date">진입: ${entryDate}</div>${bar}
        <div class="kc-bottom">${c.fund?fundBadge(c.fund,'sm'):''}${c.manager?mgrBadge(c.manager,'sm'):''}</div></div>`;
    });
    html+=`</div></div>`;
  });
  el.innerHTML=html;
}

function renderMilestones(){
  const el=document.getElementById('milestoneBody');
  const sorted=[...companies].sort((a,b)=>{
    const da=a.plannedNext&&a.plannedNext.date?new Date(a.plannedNext.date):new Date('2099-12-31');
    const db2=b.plannedNext&&b.plannedNext.date?new Date(b.plannedNext.date):new Date('2099-12-31');return da-db2;
  });
  let html='';
  sorted.forEach(c=>{
    const cur=getCurrentStage(c);const curIdx=getStageIndex(cur.stage);
    const nl=c.plannedNext&&c.plannedNext.stage?STAGES[c.plannedNext.stage]:'미정';
    const nd=c.plannedNext&&c.plannedNext.date?(c.plannedNext.date.slice(5).replace('-','/')):'미정';
    const dday=c.plannedNext&&c.plannedNext.date?getDday(c.plannedNext.date):null;
    let ddH='';if(dday===null)ddH='<span class="dday-badge dday-none">미정</span>';else if(dday<0)ddH=`<span class="dday-badge dday-urgent">D+${Math.abs(dday)}</span>`;else if(dday<=7)ddH=`<span class="dday-badge dday-urgent">D-${dday}</span>`;else ddH=`<span class="dday-badge dday-normal">D-${dday}</span>`;
    let dots='<div class="progress-dots">';for(let i=0;i<5;i++)dots+=`<span class="${i<=curIdx?'active':''}"></span>`;dots+='</div>';
    html+=`<tr onclick="openDetail('${c.id}')"><td><strong>${c.name}</strong></td><td>${c.sector||''}</td><td>${c.fund?fundBadge(c.fund,'sm'):'<span style="color:#ccc;">-</span>'}</td><td>${c.manager?mgrBadge(c.manager,'sm'):'<span style="color:#ccc;">-</span>'}</td><td><span class="stage-badge badge-${cur.stage}">${STAGES[cur.stage]}</span></td><td>${c.amount||0}억</td><td>${nl} · ${nd}</td><td>${ddH}</td><td>${dots}</td></tr>`;
  });
  el.innerHTML=html;
}

// === Add Modal ===
function openAddModal(){
  ['aName','aSector','aNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('aManager').value='';document.getElementById('aFund').value='';
  document.getElementById('aAmount').value='';document.getElementById('aStage').value='s1';
  document.getElementById('aDate').value=new Date().toISOString().slice(0,10);
  refreshSelects();document.getElementById('addModal').classList.add('active');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('active');}
async function saveNewDeal(){
  const name=document.getElementById('aName').value.trim();if(!name){alert('회사명을 입력하세요');return;}
  await dealsRef.add({name,sector:document.getElementById('aSector').value.trim(),manager:document.getElementById('aManager').value,fund:document.getElementById('aFund').value,amount:parseInt(document.getElementById('aAmount').value)||0,history:[{stage:document.getElementById('aStage').value,date:document.getElementById('aDate').value}],plannedNext:{stage:null,date:null},note:document.getElementById('aNote').value.trim()});
  closeAddModal();
}

// === Detail Modal ===
function openDetail(id){
  const c=companies.find(x=>x.id===id);if(!c)return;
  const cur=getCurrentStage(c);
  let html=`<h2>${c.name}</h2>
  <div class="form-row-3" style="margin-bottom:16px;">
    <div class="form-group"><label>기업명</label><input id="dName" value="${c.name||''}"></div>
    <div class="form-group"><label>섹터</label><input id="dSector" value="${c.sector||''}"></div>
    <div class="form-group"><label>투자금액(억)</label><input id="dAmount" type="number" value="${c.amount||0}"></div>
  </div>
  <div class="form-row-3" style="margin-bottom:16px;">
    <div class="form-group"><label>담당자</label><select id="dManager" class="mgr-select"><option value="">(담당자 미지정)</option>${managers.map(m=>`<option value="${m.name}" ${c.manager===m.name?'selected':''}>${m.name}</option>`).join('')}</select></div>
    <div class="form-group"><label>조합</label><select id="dFund" class="fund-select"><option value="">(조합 미지정)</option>${funds.map(f=>`<option value="${f.name}" ${c.fund===f.name?'selected':''}>${f.short} (${f.name})</option>`).join('')}</select></div>
    <div class="form-group"><label>비고</label><input id="dNote" value="${c.note||''}"></div>
  </div>`;
  // History
  html+=`<div class="detail-section"><h3>단계별 진입 이력</h3><div class="history-timeline">`;
  if(c.history&&c.history.length>0){c.history.forEach((h,i)=>{html+=`<div class="history-item"><span class="h-date">${h.date||''}</span><span class="h-stage">${STAGES[h.stage]||h.stage}${i===c.history.length-1?' (현재)':''}</span><button class="h-del" onclick="event.stopPropagation();deleteHistory('${c.id}',${i})">✕</button></div>`;});}
  html+=`</div><div class="add-history-row"><select id="newHistStage">${STAGE_KEYS.map(sk=>`<option value="${sk}">${STAGES[sk]}</option>`).join('')}</select><input type="date" id="newHistDate" value="${new Date().toISOString().slice(0,10)}"><button class="btn btn-sm btn-primary" onclick="addHistory('${c.id}')">+ 단계 기록</button></div></div>`;
  // Next
  html+=`<div class="detail-section"><h3>다음 예상 단계</h3><div class="next-stage-row"><div class="ns-group"><label>단계</label><select id="nextStageSelect"><option value="">미정</option>${STAGE_KEYS.map(sk=>`<option value="${sk}" ${c.plannedNext&&c.plannedNext.stage===sk?'selected':''}>${STAGES[sk]}</option>`).join('')}</select></div><div class="ns-group"><label>예정일</label><input type="date" id="nextStageDate" value="${c.plannedNext&&c.plannedNext.date?c.plannedNext.date:''}"></div></div><div class="next-stage-hint">예정일이 없으면 '미정'으로 표시됩니다.</div></div>`;
  html+=`<div class="detail-actions"><div class="detail-actions-left"><button class="btn btn-sm btn-danger" onclick="deleteDeal('${c.id}')">이 기업 삭제</button></div><div class="detail-actions-right"><button class="btn btn-sm" onclick="closeDetailModal()">취소</button><button class="btn btn-sm btn-primary" onclick="saveDetail('${c.id}')">수정</button></div></div>`;
  document.getElementById('detailModalContent').innerHTML=html;
  document.getElementById('detailModal').classList.add('active');
}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('active');}
async function addHistory(id){const c=companies.find(x=>x.id===id);if(!c)return;const h=c.history?[...c.history]:[];h.push({stage:document.getElementById('newHistStage').value,date:document.getElementById('newHistDate').value});await dealsRef.doc(id).update({history:h});setTimeout(()=>openDetail(id),300);}
async function deleteHistory(id,idx){const c=companies.find(x=>x.id===id);if(!c)return;if(c.history.length<=1){alert('최소 1개의 이력이 필요합니다.');return;}const h=[...c.history];h.splice(idx,1);await dealsRef.doc(id).update({history:h});setTimeout(()=>openDetail(id),300);}
async function saveDetail(id){
  await dealsRef.doc(id).update({name:document.getElementById('dName').value.trim(),sector:document.getElementById('dSector').value.trim(),manager:document.getElementById('dManager').value,fund:document.getElementById('dFund').value,amount:parseInt(document.getElementById('dAmount').value)||0,note:document.getElementById('dNote').value.trim(),plannedNext:{stage:document.getElementById('nextStageSelect').value||null,date:document.getElementById('nextStageDate').value||null}});
  closeDetailModal();
}
async function deleteDeal(id){const c=companies.find(x=>x.id===id);if(!c)return;if(confirm(c.name+' 을(를) 삭제하시겠습니까?')){await dealsRef.doc(id).delete();closeDetailModal();}}

// === Manager Modal ===
function openMgrModal(){document.getElementById('mgrModal').classList.add('active');}
function closeMgrModal(){document.getElementById('mgrModal').classList.remove('active');}
function renderMgrList(){
  const el=document.getElementById('mgrListArea');
  if(managers.length===0){el.innerHTML='<div class="mgr-empty">등록된 담당자가 없습니다.<br>아래에서 추가하세요.</div>';return;}
  let html='<ul class="mgr-list">';managers.forEach(m=>{html+=`<li><span class="mgr-badge-lg" style="background:${getBg(m.color)};color:${m.color};">${m.name}</span><button class="mgr-del" onclick="deleteManager('${m.id}')">✕</button></li>`;});html+='</ul>';el.innerHTML=html;
}
async function addManager(){const n=document.getElementById('mgrNewName').value.trim();if(!n){alert('이름을 입력하세요');return;}if(managers.find(m=>m.name===n)){alert('이미 등록됨');return;}await mgrsRef.add({name:n,color:document.getElementById('mgrNewColor').value});document.getElementById('mgrNewName').value='';}
async function deleteManager(id){const m=managers.find(x=>x.id===id);if(m&&confirm(m.name+' 삭제?'))await mgrsRef.doc(id).delete();}

// === Fund Modal ===
function openFundModal(){document.getElementById('fundModal').classList.add('active');}
function closeFundModal(){document.getElementById('fundModal').classList.remove('active');}
function renderFundList(){
  const el=document.getElementById('fundListArea');
  if(funds.length===0){el.innerHTML='<div class="fund-empty">등록된 조합이 없습니다.<br>아래에서 추가하세요.</div>';return;}
  let html='<ul class="fund-list-ul">';funds.forEach(f=>{html+=`<li><div><span class="fund-badge-lg" style="background:${getBg(f.color)};color:${f.color};">${f.short}</span> <span style="font-size:0.78rem;color:#888;margin-left:4px;">${f.name}</span></div><button class="fund-del" onclick="deleteFund('${f.id}')">✕</button></li>`;});html+='</ul>';el.innerHTML=html;
}
async function addFund(){
  const name=document.getElementById('fundNewName').value.trim();
  const short=document.getElementById('fundNewShort').value.trim();
  if(!name||!short){alert('정식명칭과 약칭을 모두 입력하세요');return;}
  if(funds.find(f=>f.name===name)){alert('이미 등록됨');return;}
  await fundsRef.add({name,short,color:document.getElementById('fundNewColor').value});
  document.getElementById('fundNewName').value='';document.getElementById('fundNewShort').value='';
}
async function deleteFund(id){const f=funds.find(x=>x.id===id);if(f&&confirm(f.short+' 조합을 삭제?'))await fundsRef.doc(id).delete();}

// === Export / Import ===
function exportJSON(){
  const data={companies:companies.map(c=>{const{id,...r}=c;return r;}),managers:managers.map(m=>{const{id,...r}=m;return r;}),funds:funds.map(f=>{const{id,...r}=f;return r;})};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='investment_pipeline_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
async function importJSON(e){
  const file=e.target.files[0];if(!file)return;const text=await file.text();
  try{
    const data=JSON.parse(text);if(!data.companies){alert('올바른 형식이 아닙니다.');return;}
    if(!confirm(data.companies.length+'개 기업 데이터를 가져옵니다. 기존 데이터는 삭제됩니다.'))return;
    let ex=await dealsRef.get();let b=db.batch();ex.forEach(d=>b.delete(d.ref));await b.commit();
    for(const c of data.companies){const{id,...r}=c;await dealsRef.add(r);}
    if(data.managers){ex=await mgrsRef.get();b=db.batch();ex.forEach(d=>b.delete(d.ref));await b.commit();for(const m of data.managers){const{id,...r}=m;await mgrsRef.add(r);}}
    if(data.funds){ex=await fundsRef.get();b=db.batch();ex.forEach(d=>b.delete(d.ref));await b.commit();for(const f of data.funds){const{id,...r}=f;await fundsRef.add(r);}}
    alert('가져오기 완료!');
  }catch(err){alert('오류: '+err.message);}
  e.target.value='';
}
</script>
